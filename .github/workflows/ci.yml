name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # or stable

      - name: Run tests in root
        run: go test ./...

      - name: Build chaos-agent
        run: |
          cd chaos-agent
          go build -v ./...
