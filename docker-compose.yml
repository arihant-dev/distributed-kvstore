version: '3.8'

services:
  node1:
    build: .
    container_name: kvstore-node1
    environment:
      - NODE_ID=node1
      - HTTP_PORT=8081
      - GRPC_PORT=9081
      - PEERS=node2:9082,node3:9083
    ports:
      - "8081:8081"
    networks:
      - kvnet

  node2:
    build: .
    container_name: kvstore-node2
    environment:
      - NODE_ID=node2
      - HTTP_PORT=8082
      - GRPC_PORT=9082
      - PEERS=node1:9081,node3:9083
    ports:
      - "8082:8082"
    networks:
      - kvnet

  node3:
    build: .
    container_name: kvstore-node3
    environment:
      - NODE_ID=node3
      - HTTP_PORT=8083
      - GRPC_PORT=9083
      - PEERS=node1:9081,node2:9082
    ports:
      - "8083:8083"
    networks:
      - kvnet

  # MANDATORY — the chaos agent (organizer toolkit)
  chaos-agent:
    build: ./chaos-agent
    container_name: chaos-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9090:9090"
    networks:
      - kvnet

networks:
  kvnet:
    driver: bridge
