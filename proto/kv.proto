syntax = "proto3";

package proto;

// The go_package option is required for protoc-gen-go
option go_package = "github.com/arihant/kvstore/proto";

// ReplicationService handles node-to-node communication.
service Replication {
  // AppendEntries is used by the Leader to replicate log entries to followers.
  // It also serves as a Heartbeat (if the entries array is empty).
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // RequestVote can be used if a follower hasn't heard from the master in 5 seconds
  // and wants to become the new leader.
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);

  // SyncWAL is called by a recovering follower to fetch all WAL entries
  // it missed while it was down. The follower sends its last known index,
  // and the leader responds with all entries after that index.
  rpc SyncWAL(SyncWALRequest) returns (SyncWALResponse);

  // Join is called by a new node to request entry into the cluster.
  rpc Join(JoinRequest) returns (JoinResponse);

  // Leave is called by a node to request clean exit from the cluster.
  rpc Leave(LeaveRequest) returns (LeaveResponse);

  // UpdatePeers is called by the Leader to broadcast membership changes (add/remove peer) to followers.
  rpc UpdatePeers(UpdatePeersRequest) returns (UpdatePeersResponse);
}

// Represents a single operation matching our store.LogEntry
message LogEntry {
  uint64 index = 1;
  uint32 op = 2; // 0 for PUT, 1 for DELETE
  string key = 3;
  bytes value = 4;
}

message AppendEntriesRequest {
  string leader_id = 1;      // ID of the leader node
  uint64 term = 2;           // Current term (election term)
  uint64 prev_log_index = 3; // Index of the log entry immediately preceding new ones
  repeated LogEntry entries = 4; // Log entries to store (empty for heartbeat)
  uint64 leader_commit = 5;  // The leader's commit index
}

message AppendEntriesResponse {
  uint64 term = 1;           // Follower's current term, for leader to update itself
  bool success = 2;          // True if follower contained entry matching prev_log_index
}

message RequestVoteRequest {
  string candidate_id = 1;   // ID of the node requesting the vote
  uint64 term = 2;           // Candidate's term
  uint64 last_log_index = 3; // Index of candidate's last log entry
}

message RequestVoteResponse {
  uint64 term = 1;           // Current term, for candidate to update itself
  bool vote_granted = 2;     // True means candidate received vote
}

message SyncWALRequest {
  string follower_id = 1;    // ID of the recovering follower
  uint64 last_index = 2;     // The last WAL index the follower has locally
}

message SyncWALResponse {
  repeated LogEntry entries = 1; // All entries after the follower's last_index
  uint64 leader_index = 2;      // The leader's current latest index
}

message JoinRequest {
  string node_id = 1;
  string grpc_address = 2;
}

message JoinResponse {
  bool success = 1;
  string leader_id = 2;
  string leader_address = 3;
}

message LeaveRequest {
  string node_id = 1;
}

message LeaveResponse {
  bool success = 1;
}

message UpdatePeersRequest {
  string leader_id = 1;
  uint64 term = 2;
  string peer_id = 3;
  string peer_address = 4;
  bool is_add = 5;
}

message UpdatePeersResponse {
  bool success = 1;
}

